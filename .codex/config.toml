#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_verbosity = "medium"
approval_policy = "on-request"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"
web_search = "cached"

[sandbox_workspace_write]
network_access = false
writable_roots = ["."]

# Optional project-local model instructions file if you want a single prompt file:
# model_instructions_file = "../orchestration/orchestrator-prompt.txt"

[mcp_servers.codebase-index]
enabled = true
command = "uv"
args = ["tool", "run", "--with", "mcp", "mcp-codebase-index"]
cwd = "."
required = false

[mcp_servers.codegraphcontext]
enabled = true
command = "C:\\Users\\larsv\\.local\\bin\\cgc.exe"
args = ["mcp", "start"]
cwd = "."
required = false

[mcp_servers.repomix]
enabled = true
command = "C:\\Users\\larsv\\AppData\\Roaming\\npm\\repomix.cmd"
args = ["--mcp"]
cwd = "."
required = false
